{% extends "base.html" %}
{% block title %}Add Product{% endblock %}
{% block content %}
<div style="max-width:560px;margin:40px auto;padding:0 20px">
  <div class="card">
    <h2>➕ Add New Product</h2>
    <form method="POST" enctype="multipart/form-data">
      <label>Product Name</label>
      <input type="text" name="name" placeholder="e.g. Wireless Headphones" required>

      <label>Description</label>
      <textarea name="description" rows="3" placeholder="Short product description…" required style="resize:vertical"></textarea>

      <label>Price (₹)</label>
      <input type="number" name="price" placeholder="0.00" step="0.01" min="0" required>

      <label>Stock Quantity</label>
      <input type="number" name="stock" placeholder="0" min="0" required>

      <label>Product Image (optional)</label>
      <input type="file" name="image" accept="image/*" style="border:none;padding:0;margin-bottom:20px">

      <div style="display:flex;gap:12px;margin-top:10px">
        <button class="btn btn-primary" type="submit">Add Product</button>
        <a href="/admin" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
