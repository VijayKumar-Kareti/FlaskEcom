{% extends "base.html" %}
{% block title %}Login – ShopZone{% endblock %}
{% block content %}
<div style="max-width:420px;margin:60px auto;padding:0 20px">
  <div class="card">
    <h2 style="text-align:center">Welcome Back 👋</h2>
    <p style="text-align:center;color:#888;margin-bottom:24px;font-size:14px">Sign in to your account</p>
    <form method="POST">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required>
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
      <button class="btn btn-primary" style="width:100%;margin-top:6px" type="submit">Login</button>
    </form>
    <p style="text-align:center;margin-top:18px;font-size:14px;color:#888">
      No account? <a href="/signup" style="color:#e94560;font-weight:600">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
